spring.application.name=api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/franquicias_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:franquicias_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:franquicias_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
