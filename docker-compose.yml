services:
  mysql:
    image: mysql:8.4
    container_name: franquicias-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: franquicias_db
      MYSQL_USER: franquicias_user
      MYSQL_PASSWORD: franquicias_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api/api
    container_name: franquicias-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/franquicias_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: franquicias_user
      SPRING_DATASOURCE_PASSWORD: franquicias_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"

volumes:
  mysql_data:
