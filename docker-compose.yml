services:
  mysql:
    image: mysql:8.4
    container_name: franquicias-mysql
    environment:
      MYSQL_DATABASE: franquicias_db
      MYSQL_USER: franquicias_user
      MYSQL_PASSWORD: franquicias_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Comando que Docker ejecuta periódicamente para saber si MySQL está listo.
      # "mysqladmin ping" verifica que el servidor acepta conexiones.
      # $${MYSQL_ROOT_PASSWORD}: doble $$ para escapar el $ en docker-compose
      # (un solo $ sería interpretado por Compose, no por el shell del contenedor).
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api/api
    container_name: franquicias-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/franquicias_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: franquicias_user
      SPRING_DATASOURCE_PASSWORD: franquicias_password
      #actualiza el esquema automáticamente si hay cambios en las entidades JPA.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true" #logs
    ports:
      - "8080:8080"

volumes:
  mysql_data:
